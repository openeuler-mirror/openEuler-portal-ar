# 首页轮播图 / Home Banner
#
# 字段说明：
#   bg_pc           PC 端背景图（中英文共用）
#   bg_pad          平板端背景图（中英文共用）
#   bg_mb           移动端背景图（中英文共用时不加后缀）
#   bg_mb_zh/en     移动端背景图（中英文不同时加后缀）
#   bg_theme        背景主题 light | dark，控制指示器颜色
#   text_theme      文字主题 dark=白色文字（可选）
#   title_zh/en     中英文标题（字符串或数组表示多行）
#   subtitle_zh/en  中英文副标题（可选）
#   btn_zh/en       中英文按钮文案（可选，不填则无按钮）
#   href_zh/en      中英文跳转链接
#   is_blank        是否新窗口打开（可选）
#   attach          附加装饰图（可选）
#   locale          可见语言 zh / en / zh,en（可选，默认 zh,en）

- bg_pc: ./images/release/pc.jpg
  bg_pad: ./images/release/pad.jpg
  bg_mb: ./images/release/mb.jpg
  bg_theme: light
  locale: zh
  title_zh: openEuler 24.03 LTS SP4 正式发布
  btn_zh: 下载
  href_zh: /zh/download/#openEuler%2024.03%20LTS%20SP4
  is_blank: true

