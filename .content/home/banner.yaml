  href_zh: /zh/annual-report/openEuler-annual-report-2025/
  href_en: /en/annual-report/openEuler-annual-report-2025/
  is_blank: true

- bg_pc: ./images/download/pc.jpg
  bg_pad: ./images/download/pad.jpg
