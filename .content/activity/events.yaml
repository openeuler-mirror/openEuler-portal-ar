#   status          ended=已结束 | ongoing=进行中
#   format          offline=线下 | online=线上 | hybrid=混合
#   series          系列标识（meetup）
#   group_name      关联 SIG（可选，SIG 详情页过滤用）
#   poster_image    PC 端海报（可选）
#   poster_image_mb 移动端海报（可选）
#   agenda_image    议程图 ./images/detail-<YYMMDD>.jpg（可选）
#   signup_url      报名链接（ongoing 时填写）
#   signup_url_mb   报名链接移动端
#   review_url      回顾链接（ended 后填写）

