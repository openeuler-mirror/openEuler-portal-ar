# 年度活动计划 / Year Plan
#
# 字段说明：
#   id            类别标识
#   title_zh/en   中英文标题
#   icon          图标名：opensource | developer | college | release
#   desc_zh/en    描述（可选）
#   email         联系邮箱（可选）
#   events        活动列表，只存有实际发生的活动
#     name_zh/en      中英文活动名
#     location_zh/en  中英文地点（普通类别）
#     month           月份 1-12（前端按此定位时间轴列）
#     start_month     起始月份（college 类替代 month）
#     duration        持续月数（college 类）
#     link            可选链接（college 类）
#     deadline        截止日期（release 类替代 location）

